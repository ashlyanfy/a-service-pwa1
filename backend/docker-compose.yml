services:

  redis:
    image: redis:alpine
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      # Приватный ключ VAPID — монтируем с хоста, не бакируем в образ
      - ./private_key.pem:/app/private_key.pem:ro
      # Подписки CRM — persist между перезапусками контейнера
      - ./subscriptions.json:/app/subscriptions.json
    depends_on:
      redis:
        condition: service_healthy
    restart: always

  worker:
    build: .
    command: celery -A worker worker --loglevel=info
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    restart: always

  bot:
    build: .
    command: python -m bot.main
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    restart: always
